
<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Namodul 0.0.8</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div id="topbar">
        <div class="menu-item">
            <button id="range-btn" class="nav-btn">1W ▾</button>
            <div class="dropdown">
                <div class="ind-row header">Range</div>
                <div class="ind-row" onclick="setRange('1D')">1D</div>
                <div class="ind-row" onclick="setRange('1W')">1W</div>
                <div class="ind-row" onclick="setRange('1M')">1M</div>
                <div class="ind-row" onclick="setRange('1Y')">1Y</div>
            </div>
        </div>
        <div class="menu-item">
            <button id="tf-btn" class="nav-btn">m1 ▾</button>
            <div class="dropdown">
                <div class="ind-row header">TF</div>
                <div class="ind-row" data-value="1m">m1</div>
                <div class="ind-row" data-value="5m">m5</div>
                <div class="ind-row" data-value="15m">m15</div>
            </div>
        </div>
        <div class="menu-item">
            <button id="source-btn" class="nav-btn" style="color: #2196f3;">SOURCE</button>
                <div class="dropdown">
                <div class="ind-row" onclick="setDataSource('none')">Clear</div>
                <div class="ind-row" onclick="setDataSource('twelvedata')">Twelve Data API</div>
                <div class="ind-row" onclick="setDataSource('local')">Local JS</div>
            </div>
        </div>
        <div class="menu-item">
            <button id="pair-btn" class="nav-btn">PAIR ▾</button>
            <div id="pair-dropdown" class="dropdown"></div>
        </div>
        <div id="indicator-menu" class="menu-item">
            <button class="nav-btn">INDICATORS ▾</button>
            <div class="dropdown" onclick="event.stopPropagation()">
                <label class="ind-row"><input type="checkbox" data-id="SMA" onchange="toggleIndicator('SMA', this.checked)">SMA</label>
                <label class="ind-row"><input type="checkbox" data-id="BB" onchange="toggleIndicator('BB', this.checked)">Bollinger Bands</label>
                <hr style="border:0; border-top:1px solid #363c4e; margin: 10px 0;">
                <label class="ind-row"><input type="checkbox" data-id="MACD" onchange="toggleIndicator('MACD', this.checked)">MACD</label>
                <label class="ind-row"><input type="checkbox" data-id="Stochastic" onchange="toggleIndicator('Stochastic', this.checked)">Stochastic</label>
                <hr style="border:0; border-top:1px solid #363c4e; margin: 10px 0;">
                <label class="ind-row"><input type="checkbox" data-id="Balance" onchange="toggleBalance(this.checked)">Balance</label>
            </div>
        </div>
        <div class="menu-item">
            <button class="nav-btn" onclick="toggleSettings()">STRATEGY ⚙️</button>
        </div>
        <div class="marker-nav">
            <button class="nav-btn" onclick="navigateToStart()"><<</button>
            <button class="nav-btn" onclick="changeMarker(-1)"><</button>
            <button class="nav-btn" onclick="changeMarker(1)">></button>
            <button class="nav-btn" onclick="navigateToEnd()">>></button>
        </div>
        <div style="flex-grow: 1;"></div>
        <button class="nav-btn" onclick="toggleLog()">LOG</button>
    </div>

    <div id="settings-panel">
        <div class="settings-section">
            <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                <button class="nav-btn" style="flex: 1; margin-top: 0; padding: 6px 10px; font-size: 11px;" onclick="resetStrategyCode()">Reset</button>
                <button class="nav-btn" style="flex: 1; margin-top: 0; padding: 6px 10px; font-size: 11px;" onclick="applyStrategyCode()">Apply</button>
                <button class="nav-btn" style="flex: 1; margin-top: 0; padding: 6px 10px; font-size: 11px;" onclick="window.Strategy.testStrategy()">Run</button>
            </div>
            <textarea class="code-editor" id="strategy-code-editor" placeholder="// Код из strategy-core.js будет загружен автоматически"></textarea>
            <div id="strategy-code-status" style="font-size: 11px; margin-top: 8px; color: #b2b5be;"></div>
        </div>
    </div>

    <div id="panels-container">
        <div id="main-pane" class="pane-wrapper">
            <div class="v-line"></div>
            <div id="chart-main" class="chart-container"></div>
        </div>
    </div>

    <div id="log-panel">
        <div id="log-header" onclick="toggleLog()"></div>
        <div id="log-content"></div>
    </div>
    <!-- Модальное окно настроек индикаторов и стратегии -->
    <div id="indicator-settings-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Настройки индикаторов и стратегии</h3>
                <button class="modal-close" onclick="closeIndicatorSettings()">×</button>
            </div>
            <div class="params-grid" id="params-grid">
                <!-- Параметры будут заполнены JavaScript -->
            </div>
            <div class="condition-editor">
                <label for="custom-condition">Пользовательское условие (JavaScript):</label>
                <textarea id="custom-condition" placeholder="Пример: indicator('macd').histogram > 0 && price('close') > indicator('sma').value"></textarea>
                <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                    <select id="function-select" style="flex: 1; background: #131722; border: 1px solid #363c4e; color: #d1d4dc; padding: 6px; border-radius: 4px; font-size: 12px;">
                        <option value="">-- Выберите функцию или переменную --</option>
                        <optgroup label="Функции">
                            <option value="indicator('macd')">indicator('macd')</option>
                            <option value="indicator('sma')">indicator('sma')</option>
                            <option value="indicator('bb')">indicator('bb')</option>
                            <option value="indicator('stochastic')">indicator('stochastic')</option>
                            <option value="price('close')">price('close')</option>
                            <option value="price('open')">price('open')</option>
                            <option value="price('high')">price('high')</option>
                            <option value="price('low')">price('low')</option>
                            <option value="dealStats(5)">dealStats(5)</option>
                        </optgroup>
                        <optgroup label="Переменные">
                            <option value="i">i</option>
                            <option value="data">data</option>
                            <option value="indicators">indicators</option>
                            <option value="tradeHistory">tradeHistory</option>
                        </optgroup>
                    </select>
                    <button class="nav-btn" style="font-size: 12px; padding: 6px 12px;" onclick="insertSelectedFunction()">Вставить</button>
                </div>
                <div style="margin-top: 10px; display: flex; align-items: center; gap: 10px;">
                    <button class="nav-btn" style="font-size: 12px; padding: 6px 12px; background: #4caf50;" onclick="testCondition()">Проверить условие</button>
                    <div id="condition-test-result" style="font-size: 12px; color: #d1d4dc;"></div>
                </div>
                <div style="margin-top: 10px; font-size: 11px; color: #787b86;">
                    Доступные функции: indicator(name, lag), price(type, lag), dealStats(window). Переменные: i, data, indicators, tradeHistory.
                </div>
            </div>
            <div class="modal-actions">
                <button class="nav-btn" onclick="closeIndicatorSettings()">Отмена</button>
                <button class="nav-btn" style="background: #2196f3; color: white;" onclick="applyIndicatorSettingsFromModal()">Применить</button>
            </div>
        </div>
    </div>
    <script src="./lightweight-charts.standalone.production.js"></script>
    <script src="./EURUSD_M5_data.js"></script>
    <script src="./main.js"></script>
    <script src="./prov-twelvedata.js"></script>
    <script src="./strategy_core.js"></script>
    <script src="./strategy.js"></script>
    <script src="./ind.js"></script>
