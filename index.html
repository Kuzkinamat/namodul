<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Namodul 1.0.0</title>
    <meta charset="UTF-8">
    <style>
        :root { --ps-width: 80px; --log-height: 200px; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #131722; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #topbar { height: 45px; background: #1e222d; border-bottom: 1px solid #363c4e; display: flex; align-items: center; padding: 0 20px; color: #d1d4dc; flex-shrink: 0; z-index: 2000; }
        .menu-item { position: relative; height: 100%; display: flex; align-items: center; margin-right: 10px; }
        .dropdown { display: none; position: absolute; top: 45px; left: 0; background: #1e222d; border: 1px solid #363c4e; border-radius: 0 0 4px 4px; padding: 12px; z-index: 2001; min-width: 160px; }
        .menu-item:hover .dropdown { display: block; }
        .ind-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; cursor: pointer; font-size: 11px; color: #d1d4dc; }
        .ind-row:hover { color: #2196f3; }
        .nav-btn { background: #363c4e; border: none; color: #d1d4dc; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; font-weight: bold; margin-right: 8px; }
        .nav-btn:hover { background: #4c5265; }
        #panels-container { flex: 1 1 auto; display: flex; flex-direction: column; overflow: hidden; background: #131722; position: relative; }
        .pane-wrapper { position: relative; width: 100%; border-bottom: 1px solid #363c4e; display: flex; flex-direction: column; }
        #main-pane { flex: 1 1 auto; min-height: 100px; }
        .sub-pane { height: 130px; flex-shrink: 0; }
        .chart-container { width: 100%; height: 100%; flex: 1; }
        #popbar { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 1000; pointer-events: none; }
        .info-box { background: rgba(25, 27, 34, 0.9); border: 1px solid #363c4e; border-radius: 4px; padding: 4px 10px; min-width: 75px; display: flex; flex-direction: column; align-items: center; }
        .info-label { font-size: 9px; color: #787b86; text-transform: uppercase; }
        .info-value { font-size: 13px; font-weight: bold; color: #d1d4dc; }
        .v-line { position: absolute; top: 0; bottom: 0; left: calc(50% - (var(--ps-width) / 2)); border-left: 1px dashed rgba(41, 98, 255, 0.6); z-index: 1500; pointer-events: none; }
        #log-panel { height: var(--log-height); background: #131722; border-top: 2px solid #363c4e; display: flex; flex-direction: column; flex-shrink: 0; }
        #log-panel.collapsed { height: 30px; }
        #log-header { height: 30px; background: #1e222d; display: flex; align-items: center; padding: 0 15px; font-size: 11px; font-weight: bold;: #d1ddc; justify-content: space-between; cursor: pointer; }
        #log-content { flex: 1; overflow-y: auto; padding: 10px; font-family: 'Consolas', monospace; font-size: 11px; color: #b2b5be; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="topbar">
        <div class="menu-item">
            <button id="range-btn" class="nav-btn">1W ▾</button>
            <div class="dropdown">
                <div class="ind-row" onclick="setRange('1D')">1D</div>
                <div class="ind-row" onclick="setRange('1W')">1W</div>
                <div class="ind-row" onclick="setRange('1M')">1M</div>
                <div class="ind-row" onclick="setRange('1Y')">1Y</div>
            </div>
        </div>
        <div class="menu-item">
            <button id="timeframe-btn" class="nav-btn">5m</button>
            <div class="dropdown">
                <div class="ind-row" onclick="setTimeframe('1m')">1m</div>
                <div class="ind-row" onclick="setTimeframe('5m')">5m</div>
                <div class="ind-row" onclick="setTimeframe('15')">15m</div>
            </div>
        </div>
        <div class="menu-item">
            <button id="source-btn" class="nav-btn" style="color: #2196f3;">SOURCE<div class="dropdown">
                <div class="ind-row" onclick="setDataSource('none')">Clear</div>
                <div class="ind-row" onclick="setDataSource('twelvedata')">Twelve Data API</div>
            </div>
        </div>
        <div class="menu-item">
            <button id="pair-btn" class="nav-btn">PAIR ▾</button>
            <div id="pair-dropdown" class="dropdown"></div>
        </div>
        <div id="indicator-menu" class="menu-item">
            <button class="nav-btn">INDICATORS ▾</button>
            <div class="dropdown" onclick="event.stopPropagation()">
                <label class="ind-row"><input type="checkbox" data-id="SMA" onchange="toggleIndicator('SMA', this.checked)"> SMA 20</label>
                <label class="ind-row"><input type="checkbox" data-id="BB" onchange="toggleIndicator('BB', this.checked)"> Bollinger Bands</label>
                <hr style="border:0; border-top:1px solid #363c4e; margin: 10px 0;">
                <label class="ind-row"><input type="checkbox" data-id="MACD" onchange="toggleIndicator('MACD', this.checked)"> MACD</label>
                <label class="ind-row"><input type="checkbox" data-id="Stochastic" onchange="toggleIndicator('Stochastic', this.checked)"> Stochastic</label>
            </div>
        </div>
        <button class="nav-btn" onclick="changeMarker(-1)">&lt; PREV</button>
        <button class="nav-btn" onclick="changeMarker(1)">NEXT &gt;</button>
        <div style="flex-grow: 1;"></div>
    </div>

    <div id="panels-container">
        <div id="main-pane" class="pane-wrapper">
            <div id="popbar">
                <div class="info-box"><span class="info-label">O</span><span id="val-open" class="info-value">-</span></div>
                <div class="info-box"><span class="info-label">H</span><span id="val-high" class="info-value">-</span></div>
                <div class="info-box"><span class="info-label">L</span><span id="val-low" class="info-value">-</span></div>
                <div class="info-box"><span class="info-label">C</span><span id="val-close" class="info-value">-</span></div>
            </div>
            <div class="v-line"></div>
            <div id="chart-main" class="chart-container"></div>
        </div>
    </div>

    <div id="log-panel">
        <div id="log-header" onclick="toggleLog()"><span>Log</span><span style="color:#26a69a">ONLINE</span></div>
        <div id="log-content"></div>
    </div>

    <script src="./lightweight-charts.standalone.production.js"></script>
    <script src="./prov-twelvedata.js"></script>
    <script src="./calc.js"></script>
    <script src="./ind.js"></script>
    <script src="./main.js"></script>
</body>
</html>
